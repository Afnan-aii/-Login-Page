<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinemax — Log In</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <main class="login-main">
    <div class="login-card">
      <h1 class="login-card__title">Welcome back</h1>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="password">
      </div>

      <button class="btn">LogIn</button>

      <p class="login-card__footnote">
        New here? <a href="signup.html">Create an account</a>
      </p>
    </div>
  </main>

  <footer clss = "footer">
    <p class="footer__text">&copy; 2026 Cinemax. All rights reserved.</p>
  </footer>>

</body>
</html>
