<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <div class="blob blob--1"></div>
  <div class="blob blob--2"></div>
  <div class="blob blob--3"></div>

  <div class="frame">

    <div class="brand">
      <p class="brand__mark">Aurora</p>
      <p class="brand__tagline">Good to see you again</p>
    </div>

    <div class="card">
      <h1 class="card__title">Sign in</h1>
      <p class="card__subtitle">Enter your details to continue</p>

      <form class="form">

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••">
        </div>

        <div class="field-row">
          <label class="checkbox">
            <input type="checkbox">
            Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn">Sign In</button>
      </form>

      <div class="divider">or continue with</div>

      <div class="social-row">
        <button class="social-btn">Google</button>
        <button class="social-btn">Apple</button>
      </div>

      <p class="footnote">Don't have an account? <a href="signup.html">Create one</a></p>
    </div>

  </div>

</body>
</html>
