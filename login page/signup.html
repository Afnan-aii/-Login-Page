<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <div class="blob blob--1"></div>
  <div class="blob blob--2"></div>
  <div class="blob blob--3"></div>

  <div class="frame">

    <div class="brand">
      <p class="brand__mark">Aurora</p>
      <p class="brand__tagline">Let's set up your account</p>
    </div>

    <div class="card">
      <h1 class="card__title">Create account</h1>
      <p class="card__subtitle">Start your journey with us</p>

      <form class="form">

        <div class="field">
          <label for="name">Full name</label>
          <input id="name" type="text" placeholder="Full Name">
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••">
        </div>

        <div class="field-row">
          <label class="checkbox">
            <input type="checkbox">
            I agree to the Terms &amp; Privacy Policy
          </label>
        </div>

        <button type="submit" class="btn">Create Account</button>
      </form>

      <div class="divider">or continue with</div>

      <div class="social-row">
        <button class="social-btn">Google</button>
        <button class="social-btn">Apple</button>
      </div>

      <p class="footnote">Already have an account? <a href="login.html">Sign in</a></p>
    </div>

  </div>

</body>
</html>
